<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Certifications — UGAT TrainTrack</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/styles.css">
  <style>
    .certs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
      margin-top: 1.5rem;
    }
    .cert-card {
      background: #fff;
      border: 1.5px solid var(--color-border);
      border-radius: 14px;
      padding: 1.25rem 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: box-shadow 0.18s;
    }
    .cert-card:hover { box-shadow: 0 4px 18px rgba(75,132,35,0.10); }
    .cert-card.issued { border-color: #b7dfa0; background: #f8fdf4; }
    .cert-card.eligible { border-color: #f6d88a; background: #fffdf0; }
    .cert-card-top { display: flex; align-items: flex-start; gap: 0.75rem; }
    .cert-icon-lg {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; flex-shrink: 0;
    }
    .cert-icon-lg.issued   { background: #eaf6da; }
    .cert-icon-lg.eligible { background: #fff3cc; }
    .cert-icon-lg.locked   { background: #f0f0f0; }
    .cert-title { font-weight: 700; font-size: 0.97rem; color: var(--color-text); line-height: 1.4; }
    .cert-meta  { font-size: 0.78rem; color: var(--color-text-mid); margin-top: 0.15rem; }
    .cert-card-footer { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; flex-wrap: wrap; }
    .cert-no { font-size: 0.72rem; color: var(--color-text-light); font-family: monospace; }

    /* cert modal */
    .cert-view-modal .modal-box { max-width: 820px; width: 95vw; }
    #cert-view-body { overflow-x: auto; }

    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--color-text-mid); }
    .empty-state-icon { font-size: 3rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
<div class="app-layout">

  <nav class="app-nav">
    <div class="nav-logo">
      <a href="TraineeDashboard.html">
        <img src="../../images/logo.jpg" alt="UGAT" class="nav-logo-img" onerror="this.style.display='none'">
      </a>
    </div>
    <div class="nav-links">
      <a href="TraineeDashboard.html" class="nav-link">Dashboard</a>
      <a href="TraineeWorkshops.html" class="nav-link">My Workshops</a>
      <a href="TraineeShop.html"      class="nav-link">Farm Shop</a>
    </div>
    <div class="nav-user">
      <div class="user-dropdown-trigger" onclick="toggleUserMenu(event)">
        <img src="https://i.pravatar.cc/36?img=5" alt="" class="user-avatar" id="nav-avatar">
        <span class="user-dropdown-name" id="nav-name">— <span class="user-caret">▾</span></span>
      </div>
      <div class="user-dropdown" id="user-dropdown">
        <div class="user-dropdown-header">
          <img src="https://i.pravatar.cc/48?img=5" alt="" class="user-dropdown-avatar" id="dropdown-avatar">
          <div>
            <div class="user-dropdown-fullname" id="dropdown-name"></div>
            <div class="user-dropdown-role">Trainee</div>
          </div>
        </div>
        <div class="user-dropdown-divider"></div>
        <a href="profile.php" class="user-dropdown-item">👤 My Profile</a>
        <div class="user-dropdown-divider"></div>
        <a href="../auth/Login.html" class="user-dropdown-item user-dropdown-logout">🚪 Logout</a>
      </div>
    </div>
  </nav>

  <main class="app-content">
    <div class="page-header">
      <div>
        <h2 class="page-title">My Certifications</h2>
        <p class="page-sub">View and download your earned certificates</p>
      </div>
    </div>

    <!-- Filter row -->
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center">
      <button class="btn-outline-sm active" id="filter-all"      onclick="setFilter('all',this)">All</button>
      <button class="btn-outline-sm"        id="filter-issued"   onclick="setFilter('issued',this)">Issued</button>
      <button class="btn-outline-sm"        id="filter-eligible" onclick="setFilter('eligible',this)">Eligible</button>
      <button class="btn-outline-sm"        id="filter-locked"   onclick="setFilter('locked',this)">Locked</button>
    </div>

    <div class="certs-grid" id="certs-grid">
      <p style="color:#aaa;padding:2rem 0">Loading…</p>
    </div>
  </main>
</div>

<!-- Certificate view modal -->
<div id="cert-view-modal" class="modal-overlay cert-view-modal" onclick="closeModalOutside(event,'cert-view-modal')">
  <div class="modal-box">
    <div class="modal-header">
      <div><h3>Certificate</h3></div>
      <button class="modal-close" onclick="closeModal('cert-view-modal')">✕</button>
    </div>
    <div style="padding:1.25rem;overflow-y:auto;max-height:80vh">
      <div id="cert-view-body"></div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="TraineeCertifications.js"></script>
<script>
function toggleUserMenu(e) {
  e.stopPropagation();
  var d = document.getElementById('user-dropdown'), c = document.querySelector('.user-caret');
  if (!d) return; var open = d.classList.contains('open');
  d.classList.toggle('open', !open); if (c) c.classList.toggle('open', !open);
}
document.addEventListener('click', function() {
  var d = document.getElementById('user-dropdown'), c = document.querySelector('.user-caret');
  if (d) d.classList.remove('open'); if (c) c.classList.remove('open');
});
</script>
</body>
</html>
